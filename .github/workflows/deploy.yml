name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild manually from the Actions tab

# Permissions the deploy needs (uses the built-in token — no secrets to set up).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Do NOT cancel an in-progress run: cancelling a
# deployment that GitHub Pages has already created leaves it in a failed state,
# and the next run then dies with "Deployment failed, try again later." Queue
# instead so back-to-back result edits each deploy to completion.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (runs the simulation -> site/data.json + site/index.html)
        run: python build.py
        env:
          N_STATS: "100000"   # more sims -> more stable odds (~0.1pp noise). Local default stays 10k.

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
