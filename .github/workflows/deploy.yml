name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild manually from the Actions tab

# Permissions the deploy needs (uses the built-in token — no secrets to set up).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Do NOT cancel an in-progress run: cancelling a
# deployment mid-flight leaves it failed and the next run inherits a bad state.
# Queue instead so back-to-back result edits each deploy to completion.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://chrtrap.github.io/vmsimulator/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (runs the simulation -> site/data.json + site/index.html)
        run: python build.py
        env:
          N_STATS: "100000"   # more sims -> more stable odds (~0.1pp noise). Local default stays 10k.

      - name: Stamp build (fingerprint for verifying the live deploy)
        run: echo "${GITHUB_SHA} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > site/version.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # actions/deploy-pages hits a GitHub Pages backend that intermittently
      # rejects a deployment on the first status poll ("Deployment failed, try
      # again later."), ~half the time, unrelated to the build. It is a fresh,
      # independent attempt each time, so we retry up to 5x with backoff. Each
      # step runs only if the previous attempt *failed*; a success skips the
      # rest of the chain. The final attempt has no continue-on-error, so if all
      # five fail the job fails loudly.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 3
        if: steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 4
        if: steps.deploy3.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 4)
        id: deploy4
        if: steps.deploy3.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 5
        if: steps.deploy4.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 5, final)
        id: deploy
        if: steps.deploy4.outcome == 'failure'
        uses: actions/deploy-pages@v4
