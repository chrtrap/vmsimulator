name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild manually from the Actions tab

# Publishing pushes the built site to the gh-pages branch, so the token needs
# write access to repo contents. (The old artifact + actions/deploy-pages path
# was chronically flaky — "Deployment failed, try again later." / "Fetching
# artifact metadata failed." — so we bypass it entirely and let GitHub's classic
# branch-based Pages builder serve the gh-pages branch.)
permissions:
  contents: write

# Only one deploy at a time. Do NOT cancel an in-progress run: cancelling a
# publish mid-push can leave gh-pages half-written. Queue instead so back-to-back
# result edits each deploy to completion.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (runs the simulation -> site/data.json + site/index.html)
        run: python build.py
        env:
          N_STATS: "100000"   # more sims -> more stable odds (~0.1pp noise). Local default stays 10k.

      - name: Stamp build (fingerprint for verifying the live deploy)
        run: |
          echo "${GITHUB_SHA} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > site/version.txt
          touch site/.nojekyll   # serve data.json/index.html as-is, no Jekyll processing

      - name: Publish to gh-pages branch
        run: |
          cd site
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
